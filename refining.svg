<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Chemical refining glassware with bubbling solution and vapour">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d1214"/><stop offset="1" stop-color="#070a0b"/></linearGradient>
    <radialGradient id="rglow" cx="50%" cy="60%" r="60%"><stop offset="0" stop-color="#37d0c0" stop-opacity="0.18"/><stop offset="1" stop-color="#37d0c0" stop-opacity="0"/></radialGradient>
    <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd35c"/><stop offset="1" stop-color="#e07a1e"/></linearGradient>
    <linearGradient id="liq2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6fe3d2"/><stop offset="1" stop-color="#1c8f86"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.2"/></linearGradient>
    <filter id="rblur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#rbg)"/>
  <rect width="800" height="600" fill="url(#rglow)"/>

  <!-- bench -->
  <rect x="0" y="500" width="800" height="4" fill="#ffffff" opacity="0.08"/>

  <!-- Erlenmeyer flask (amber, bubbling) -->
  <g>
    <path d="M300 240 h40 v70 l55 170 a12 12 0 0 1 -11 18 h-128 a12 12 0 0 1 -11 -18 l55 -170 z" fill="url(#glass)" stroke="#bfeee8" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M276 380 l-16 100 a12 12 0 0 0 11 18 h98 a12 12 0 0 0 11 -18 l-16 -100 z" fill="url(#liq)" opacity="0.9"/>
    <g fill="#fff6d8">
      <circle cx="300" cy="450" r="4"><animate attributeName="cy" values="470;390" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="330" cy="460" r="3"><animate attributeName="cy" values="475;400" dur="3s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0" dur="3s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="315" cy="455" r="2.4"><animate attributeName="cy" values="470;410" dur="2.2s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0" dur="2.2s" begin="1s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- vapour -->
  <g fill="#bfeee8" filter="url(#rblur)" opacity="0.5">
    <circle cx="320" cy="220" r="14"><animate attributeName="cy" values="230;120" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="305" cy="200" r="10"><animate attributeName="cy" values="210;110" dur="6s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0" dur="6s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Round-bottom flask on stand (teal) -->
  <g transform="translate(470 250)">
    <circle cx="70" cy="150" r="86" fill="url(#glass)" stroke="#bfeee8" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M6 168 a86 86 0 0 0 128 0 a70 70 0 0 1 -128 0 z" fill="url(#liq2)" opacity="0.9"/>
    <path d="M-4 150 a86 86 0 0 0 148 0 v0 a74 74 0 0 1 -148 0 z" fill="url(#liq2)" opacity="0.85"/>
    <rect x="58" y="30" width="24" height="50" rx="4" fill="url(#glass)" stroke="#bfeee8" stroke-width="2" stroke-opacity="0.4"/>
    <g fill="#dffaf5">
      <circle cx="55" cy="180" r="4"><animate attributeName="cy" values="200;110" dur="3.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0" dur="3.2s" repeatCount="indefinite"/></circle>
      <circle cx="85" cy="185" r="3"><animate attributeName="cy" values="205;120" dur="2.8s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0" dur="2.8s" begin="0.8s" repeatCount="indefinite"/></circle>
    </g>
    <!-- stand -->
    <rect x="-30" y="236" width="200" height="8" rx="3" fill="#4a4a52"/>
    <rect x="150" y="60" width="8" height="184" fill="#4a4a52"/>
  </g>

  <!-- test tubes -->
  <g transform="translate(120 330)">
    <rect x="0" y="0" width="26" height="150" rx="13" fill="url(#glass)" stroke="#bfeee8" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="3" y="70" width="20" height="77" rx="10" fill="url(#liq)"/>
    <rect x="40" y="20" width="26" height="150" rx="13" fill="url(#glass)" stroke="#bfeee8" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="43" y="90" width="20" height="77" rx="10" fill="url(#liq2)"/>
  </g>
</svg>
