<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" width="480" height="600" role="img" aria-label="From raw gold dust, through melting and pouring, to a refined 999.9 fine gold bar">
  <defs>
    <linearGradient id="sgBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#171310"/><stop offset="0.5" stop-color="#0f0c09"/><stop offset="1" stop-color="#080605"/></linearGradient>
    <radialGradient id="sgGlow" cx="50%" cy="50%" r="60%"><stop offset="0" stop-color="#c9a227" stop-opacity="0.30"/><stop offset="1" stop-color="#c9a227" stop-opacity="0"/></radialGradient>
    <radialGradient id="sgHot" cx="50%" cy="50%" r="55%"><stop offset="0" stop-color="#ff9d2e" stop-opacity="0.55"/><stop offset="1" stop-color="#ff9d2e" stop-opacity="0"/></radialGradient>
    <linearGradient id="sgGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff6d8"/><stop offset="0.35" stop-color="#f6d873"/><stop offset="0.65" stop-color="#c9a227"/><stop offset="1" stop-color="#8a6a1c"/></linearGradient>
    <linearGradient id="sgGoldTop" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffe9a8"/><stop offset="0.5" stop-color="#f3cf5f"/><stop offset="1" stop-color="#d0a92b"/></linearGradient>
    <linearGradient id="sgMolten" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff7d6"/><stop offset="0.45" stop-color="#ffc24a"/><stop offset="1" stop-color="#e0631c"/></linearGradient>
    <radialGradient id="sgMound" cx="50%" cy="28%" r="78%"><stop offset="0" stop-color="#eccb5d"/><stop offset="1" stop-color="#795916"/></radialGradient>
    <filter id="sgSoft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="480" height="600" fill="url(#sgBg)"/>
  <rect width="480" height="600" fill="url(#sgGlow)"/>

  <!-- stage dividers -->
  <g stroke="#c9a227" stroke-opacity="0.14" stroke-width="1">
    <line x1="42" y1="214" x2="438" y2="214"/>
    <line x1="42" y1="402" x2="438" y2="402"/>
  </g>

  <!-- stage labels -->
  <g font-family="Montserrat, sans-serif" font-size="12.5" font-weight="600" letter-spacing="3" fill="#f6e2a0">
    <text x="42" y="50">01 · GOLD DUST</text>
    <text x="42" y="250">02 · MELT &amp; POUR</text>
    <text x="42" y="440">03 · 999.9 FINE BAR</text>
  </g>

  <!-- ===================== Stage 1 — gold dust ===================== -->
  <g>
    <ellipse cx="240" cy="192" rx="122" ry="24" fill="#000" opacity="0.4" filter="url(#sgSoft)"/>
    <ellipse cx="240" cy="182" rx="114" ry="30" fill="url(#sgMound)"/>
    <!-- grains -->
    <g fill="url(#sgGoldTop)">
      <circle cx="150" cy="178" r="3"/><circle cx="168" cy="185" r="4"/><circle cx="185" cy="172" r="3"/><circle cx="200" cy="187" r="4.2"/><circle cx="216" cy="170" r="3.4"/>
      <circle cx="232" cy="183" r="4.6"/><circle cx="248" cy="168" r="3"/><circle cx="263" cy="185" r="4"/><circle cx="278" cy="174" r="3.4"/><circle cx="293" cy="187" r="4"/>
      <circle cx="308" cy="176" r="3"/><circle cx="322" cy="184" r="3.4"/><circle cx="160" cy="168" r="2.6"/><circle cx="205" cy="163" r="2.6"/><circle cx="250" cy="159" r="3"/>
      <circle cx="290" cy="164" r="2.6"/><circle cx="320" cy="170" r="2.6"/><circle cx="140" cy="187" r="3"/><circle cx="336" cy="182" r="3"/><circle cx="226" cy="191" r="3.4"/>
      <circle cx="271" cy="191" r="3"/><circle cx="190" cy="191" r="3"/><circle cx="301" cy="191" r="3"/><circle cx="176" cy="176" r="2.4"/><circle cx="240" cy="176" r="2.6"/>
    </g>
    <!-- nuggets -->
    <g fill="url(#sgGold)" stroke="#8a6a1c" stroke-width="1">
      <ellipse cx="196" cy="172" rx="14" ry="10"/>
      <ellipse cx="272" cy="166" rx="16" ry="11"/>
      <ellipse cx="234" cy="180" rx="11" ry="8"/>
    </g>
    <!-- floating dust specks -->
    <g fill="#ffe9a8" opacity="0.85">
      <circle cx="172" cy="140" r="2"/><circle cx="220" cy="128" r="1.6"/><circle cx="262" cy="138" r="2"/><circle cx="302" cy="132" r="1.6"/>
      <circle cx="200" cy="150" r="1.4"/><circle cx="284" cy="150" r="1.6"/><circle cx="242" cy="120" r="1.6"/><circle cx="150" cy="150" r="1.4"/>
    </g>
  </g>

  <!-- ===================== Stage 2 — melt & pour ===================== -->
  <g>
    <ellipse cx="252" cy="320" rx="150" ry="86" fill="url(#sgHot)"/>
    <!-- ingot mould -->
    <rect x="196" y="356" width="120" height="28" rx="5" fill="#241f18"/>
    <rect x="204" y="352" width="104" height="11" rx="4" fill="url(#sgMolten)"/>
    <!-- molten stream -->
    <path d="M198 302 q4 36 58 58" stroke="url(#sgMolten)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- crucible -->
    <g transform="rotate(-24 172 288)">
      <path d="M128 262 h96 l-15 66 a6 6 0 0 1 -6 4 h-54 a6 6 0 0 1 -6 -4 z" fill="#2c261d" stroke="url(#sgGold)" stroke-width="2.5"/>
      <ellipse cx="176" cy="262" rx="48" ry="12" fill="url(#sgMolten)"/>
      <ellipse cx="176" cy="260" rx="40" ry="8" fill="#fff7d6" opacity="0.5"/>
    </g>
    <!-- droplets -->
    <g fill="url(#sgMolten)">
      <circle cx="238" cy="346" r="3"/><circle cx="248" cy="336" r="2.4"/>
    </g>
    <!-- flames -->
    <g fill="url(#sgMolten)" opacity="0.92">
      <path d="M150 360 q-12 -26 0 -44 q12 18 0 44z"/>
      <path d="M182 366 q-10 -22 0 -36 q10 14 0 36z"/>
      <path d="M120 366 q-9 -18 0 -32 q9 12 0 32z"/>
    </g>
  </g>

  <!-- ===================== Stage 3 — finished 999.9 bar ===================== -->
  <g>
    <ellipse cx="242" cy="548" rx="150" ry="26" fill="#000" opacity="0.4" filter="url(#sgSoft)"/>
    <!-- second bar behind -->
    <g transform="translate(158 520)">
      <path d="M0 0 l150 0 l26 -18 l-150 0 z" fill="url(#sgGoldTop)" opacity="0.8"/>
      <path d="M0 0 l150 0 l0 32 l-150 0 z" fill="url(#sgGold)" opacity="0.8"/>
      <path d="M150 0 l26 -18 l0 32 l-26 18 z" fill="#a5801f" opacity="0.8"/>
    </g>
    <!-- hero bar -->
    <g transform="translate(116 474)">
      <path d="M0 0 l184 0 l36 -26 l-184 0 z" fill="url(#sgGoldTop)"/>
      <path d="M0 0 l184 0 l0 48 l-184 0 z" fill="url(#sgGold)"/>
      <path d="M184 0 l36 -26 l0 48 l-36 26 z" fill="#a5801f"/>
      <text x="92" y="27" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="23" font-weight="700" fill="#6b5214">999.9</text>
      <text x="92" y="41" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="8" font-weight="600" letter-spacing="3.5" fill="#6b5214">FINE GOLD</text>
      <path d="M14 4 L54 4 L8 44 L8 22 Z" fill="#ffffff" opacity="0.16"/>
    </g>
    <!-- sparkles -->
    <g fill="#fff6d8">
      <path d="M336 470 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4z"/>
      <path d="M92 498 l3 6 6 3 -6 3 -3 6 -3 -6 -6 -3 6 -3z"/>
      <path d="M356 536 l2.6 5.4 5.4 2.6 -5.4 2.6 -2.6 5.4 -2.6 -5.4 -5.4 -2.6 5.4 -2.6z"/>
    </g>
  </g>
</svg>
