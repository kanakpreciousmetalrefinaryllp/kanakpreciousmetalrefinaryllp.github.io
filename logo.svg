<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Kanak Precious Metal Refinery LLP emblem">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e2a0"/><stop offset="0.5" stop-color="#c9a227"/><stop offset="1" stop-color="#8a6a1c"/>
    </linearGradient>
    <radialGradient id="cream" cx="50%" cy="42%" r="65%">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3ece0"/>
    </radialGradient>
    <path id="arcTop" d="M56,200 A144,144 0 0 1 344,200" fill="none"/>
    <path id="arcBot" d="M60,200 A140,140 0 0 0 340,200" fill="none"/>
  </defs>

  <circle cx="200" cy="200" r="197" fill="url(#gold)"/>
  <circle cx="200" cy="200" r="190" fill="#6e1622"/>
  <circle cx="200" cy="200" r="184" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <circle cx="200" cy="200" r="162" fill="url(#cream)"/>
  <circle cx="200" cy="200" r="162" fill="none" stroke="url(#gold)" stroke-width="3"/>

  <text fill="url(#gold)" font-family="Georgia, serif" font-size="21" font-weight="700" letter-spacing="3">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">PURITY · PRECISION · TRUST</textPath>
  </text>
  <text fill="url(#gold)" font-family="Georgia, serif" font-size="14.5" font-weight="600" letter-spacing="2.5">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">REFINING EXCELLENCE · DELIVERING VALUE</textPath>
  </text>

  <!-- lotus -->
  <g fill="url(#gold)" transform="translate(200 118)">
    <path d="M0 -20c-6 11-6 22 0 32 6-10 6-21 0-32z"/>
    <path d="M0 -14c-11 7-17 16-15 28 11-2 20-11 15-28z"/>
    <path d="M0 -14c11 7 17 16 15 28-11-2-20-11-15-28z"/>
    <path d="M-24 -4c-5 9-6 19 1 26 6-7 6-18-1-26z"/>
    <path d="M24 -4c5 9 6 19-1 26-6-7-6-18 1-26z"/>
  </g>
  <!-- K -->
  <path d="M168 150v96M168 198l40-44M168 198l44 48" fill="none" stroke="#7c1f2c" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- molten pour -->
  <path d="M126 176c-14 2-20 20-8 30 8-18 26-16 34-6 6-12-14-26-26-24z" fill="url(#gold)"/>
  <path d="M120 216c22 12 52 12 74-4" fill="none" stroke="url(#gold)" stroke-width="9" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="200" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="700" letter-spacing="6" fill="#7c1f2c">KANAK</text>
  <text x="200" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="600" letter-spacing="3" fill="#b98a2a">PRECIOUS METAL REFINERY LLP</text>
</svg>
