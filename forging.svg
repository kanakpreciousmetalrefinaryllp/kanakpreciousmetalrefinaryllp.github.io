<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Molten gold being poured from a crucible into a bar mould">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191013"/><stop offset="1" stop-color="#0a0708"/>
    </linearGradient>
    <radialGradient id="heat" cx="38%" cy="72%" r="55%">
      <stop offset="0" stop-color="#ffb347" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#c9581a" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#c9581a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="molten" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3c4"/><stop offset="0.5" stop-color="#ffcf5c"/><stop offset="1" stop-color="#ff8a1e"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a3a40"/><stop offset="0.5" stop-color="#6a6a72"/><stop offset="1" stop-color="#2a2a2e"/>
    </linearGradient>
    <linearGradient id="crucible" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a4632"/><stop offset="1" stop-color="#241a10"/>
    </linearGradient>
    <filter id="fglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#fbg)"/>
  <rect width="800" height="600" fill="url(#heat)"/>

  <!-- mould -->
  <g>
    <rect x="120" y="430" width="260" height="70" rx="10" fill="url(#metal)" stroke="#15151a" stroke-width="3"/>
    <rect x="138" y="446" width="224" height="30" rx="6" fill="#1a120a"/>
    <ellipse cx="250" cy="452" rx="112" ry="12" fill="url(#molten)" opacity="0.95" filter="url(#fglow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- crucible pouring -->
  <g transform="rotate(38 560 190)">
    <path d="M470 150 h170 l-20 120 h-130 z" fill="url(#crucible)" stroke="#15100a" stroke-width="4"/>
    <ellipse cx="555" cy="150" rx="85" ry="20" fill="#3a2a18" stroke="#15100a" stroke-width="4"/>
    <ellipse cx="555" cy="150" rx="66" ry="13" fill="url(#molten)" filter="url(#fglow)"/>
  </g>

  <!-- molten stream -->
  <path d="M470 250 C 430 300, 360 360, 250 448" stroke="url(#molten)" stroke-width="15" fill="none" stroke-linecap="round" filter="url(#fglow)">
    <animate attributeName="stroke-width" values="13;17;13" dur="1.6s" repeatCount="indefinite"/>
  </path>

  <!-- sparks / embers -->
  <g fill="#ffd873" filter="url(#fglow)">
    <circle cx="250" cy="440" r="3"><animate attributeName="cy" values="440;250" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="440" r="2.4"><animate attributeName="cy" values="440;300" dur="3s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="3s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="445" r="2"><animate attributeName="cy" values="445;280" dur="2.6s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.6s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="448" r="2.6"><animate attributeName="cy" values="448;320" dur="3.4s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="3.4s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="445" r="1.8"><animate attributeName="cy" values="445;330" dur="2.9s" begin="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.9s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- vignette -->
  <rect width="800" height="600" fill="url(#fbg)" opacity="0" />
  <rect width="800" height="600" fill="none" stroke="#000" stroke-width="0"/>
</svg>
